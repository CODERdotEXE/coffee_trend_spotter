name: Brewscope sync

# Runs the data collector on a schedule (and on demand), then commits the refreshed
# JSON back to the repo. Cloudflare/GitHub Pages auto-deploys the new data.
on:
  schedule:
    - cron: "0 6 * * *"      # daily at 06:00 UTC
  workflow_dispatch: {}      # manual trigger button

permissions:
  contents: write            # required to commit/push changes

concurrency:
  group: brewscope-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync (collect + accumulate + forecast)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: python collector.py

      - name: Commit and push changes
        run: |
          git config user.name "brewscope-bot"
          git config user.email "actions@users.noreply.github.com"
          
          # Add the specific files
          git add data/store.json data/dataset.json data/search_interest.json data/perception_interest.json
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Brewscope sync $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Push changes using the GITHUB_TOKEN for authentication
            git push origin HEAD:${GITHUB_REF}
          else
            echo "No data changes detected."
          fi
