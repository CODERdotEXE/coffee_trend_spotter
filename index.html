<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brewscope · Coffee NPD Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="static/styles.css">
  <script>
    /* Static deployment (Cloudflare/GitHub Pages). Data is the committed JSON; the
       Sync button opens the GitHub Actions workflow you trigger manually.
       Set BREWSCOPE_ACTIONS_URL to your repo's workflow URL to enable that button. */
    window.BREWSCOPE_STATIC = true;
    window.BREWSCOPE_ACTIONS_URL = ""; // e.g. "https://github.com/<you>/<repo>/actions/workflows/sync.yml"
  </script>
</head>
<body>
<!-- Top app bar -->
<header class="appbar">
  <div class="appbar-left">
    <span class="mark">B</span>
    <div class="product">
      <div class="p-name">Brewscope</div>
      <div class="p-sub">Coffee NPD Console</div>
    </div>
    <span class="org-chip">Tata Consumer Products</span>
  </div>
  <div class="appbar-right">
    <div class="segmented" id="regionToggle">
      <button data-region="USUK" class="active">US + UK</button>
      <button data-region="US">US</button>
      <button data-region="GB">UK</button>
      <button data-region="CA">Canada</button>
    </div>
    <button class="btn-sync" id="syncBtn"><span class="material-symbols-outlined">sync</span> Sync</button>
  </div>
</header>

<div class="layout">
  <!-- Left nav rail -->
  <nav class="rail">
    <button class="rail-item active" data-view="overview"><span class="material-symbols-outlined">dashboard</span> Overview</button>
    <button class="rail-item" data-view="types"><span class="material-symbols-outlined">local_cafe</span> Coffee Types</button>
    <button class="rail-item" data-view="perception"><span class="material-symbols-outlined">radar</span> Perception Radar</button>
    <button class="rail-item" data-view="brands"><span class="material-symbols-outlined">storefront</span> Brands</button>
    <button class="rail-item" data-view="forecast"><span class="material-symbols-outlined">query_stats</span> Forecast &amp; Impact</button>
    <button class="rail-item" data-view="portfolio"><span class="material-symbols-outlined">workspace_premium</span> Our Portfolio</button>
    <button class="rail-item" data-view="launches"><span class="material-symbols-outlined">rocket_launch</span> Launch Radar</button>
    <div class="rail-foot">
      <div class="rf-label">Markets</div>
      <div class="rf-val" id="markets">US · UK · Canada</div>
      <div class="rf-label" style="margin-top:10px">Sources</div>
      <div class="rf-val" id="sources">—</div>
      <div class="rf-label" style="margin-top:10px">Last sync</div>
      <div class="rf-val" id="lastSync">Never</div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="page-head">
      <div>
        <h1 id="viewTitle">Overview</h1>
        <div class="crumb" id="viewSub">Category signals across US &amp; UK</div>
      </div>
      <div class="data-window" id="dataWindow" title="Date range of the conversation in view"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Sync status -->
<div class="sync-toast" id="syncToast">
  <div class="sync-head"><span class="spinner"></span><b>Syncing latest data</b></div>
  <div class="sync-log" id="syncLog"></div>
</div>

<div class="drawer-bg" id="drawerBg"></div>
<aside class="drawer" id="drawer"></aside>

<script src="static/app.js"></script>
</body>
</html>
